name: Qt 6 Multi-Platform Build & Release

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 5'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
            
    runs-on: ${{ matrix.os }}
          
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- LINUX SETUP ---
      - name: Install Qt 6 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential qmake6 qt6-base-dev qt6-multimedia-dev
            
      # --- WINDOWS SETUP ---
      - name: Install Qt 6 (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'

      - name: Set up MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # --- FIX: CLEAR STALE CONFIG ---
      - name: Clean stale qmake cache
        if: runner.os == 'Windows'
        run: |
          if (Test-Path .qmake.stash) { Remove-Item .qmake.stash }
          if (Test-Path .qmake.cache) { Remove-Item .qmake.cache }
        shell: pwsh

      # --- CONFIGURE ---
      - name: Configure project
        # On Windows, we force qmake to use the MSVC spec explicitly
        run: |
          ${{ runner.os == 'Windows' && 'qmake -spec win32-msvc' || 'qmake6' }}
          
      # --- COMPILE ---
      - name: Compile project
        run: ${{ runner.os == 'Windows' && 'nmake' || 'make' }}

      # --- WINDOWS DEPLOYMENT ---
      - name: Package Windows Binary
        if: runner.os == 'Windows'
        run: |
          mkdir build_assets
          copy *.exe build_assets\
          windeployqt --dir build_assets build_assets\*.exe
        
      - name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-game-build
          path: build_assets/

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current commit SHA as tag
        id: tag
        run: echo "RELEASE_TAG=v$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-game-build
          path: ./release-assets

      - name: Zip Windows Release
        run: zip -r windows-build.zip ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.RELEASE_TAG }}
          draft: true
          files: windows-build.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
